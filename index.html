<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday My Serena Williams</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:white;
text-align:center;
}

h1{font-size:48px;margin:10px;}
h2{margin-top:0;font-weight:400}

button{
padding:12px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff4d79;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

#cake{
width:140px;
height:120px;
position:relative;
margin-top:20px;
}

.layer{
position:absolute;
width:140px;
height:40px;
background:#ffb3c6;
border-radius:10px;
}

.layer:nth-child(1){bottom:0}
.layer:nth-child(2){bottom:35px;background:#ffc2d1}
.layer:nth-child(3){bottom:70px;background:#ffd6e0}

.candle{
position:absolute;
width:10px;
height:35px;
background:white;
top:-30px;
left:65px;
border-radius:2px;
}

.flame{
width:12px;
height:12px;
background:orange;
border-radius:50%;
position:absolute;
top:-10px;
left:-1px;
animation:flicker 0.3s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

.heart{
position:absolute;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-120vh);opacity:0}
}

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1.2s ease-out forwards;
}

@keyframes explode{
0%{transform:scale(1);opacity:1}
100%{transform:scale(8);opacity:0}
}

#message{
max-width:550px;
font-size:22px;
min-height:60px;
}

#secret{
display:none;
max-width:500px;
margin-top:15px;
font-size:20px;
}
</style>
</head>
<body>

<h1>Happy Birthday 🎂</h1>
<h2>My Serena Williams</h2>

<div id="cake">
<div class="layer"></div>
<div class="layer"></div>
<div class="layer"></div>
<div class="candle"><div class="flame"></div></div>
</div>

<p id="message"></p>

<button onclick="celebrate()">Cut the Cake 🎉</button>

<div id="secret">
Some people just exist… and the world stays the same.

But then there are people like you — who make everything feel lighter, happier, and a little more beautiful just by being themselves.

I hope this year gives you countless reasons to smile.

Happy Birthday. 🌸
</div>

<script>

let text="Today the world celebrates someone truly special.";
let i=0;
function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,45);
}}
typing();

function celebrate(){

// show message

document.getElementById("secret").style.display="block";

// hearts

for(let i=0;i<25;i++){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.bottom="-20px";
heart.style.animationDuration=(4+Math.random()*3)+"s";
document.body.appendChild(heart);
}

// fireworks

for(let i=0;i<40;i++){
let fw=document.createElement("div");
fw.className="firework";
fw.style.left=Math.random()*100+"vw";
fw.style.top=Math.random()*60+"vh";
fw.style.background="hsl("+Math.random()*360+",100%,60%)";
document.body.appendChild(fw);

setTimeout(()=>{fw.remove()},1200);
}
}

</script>

</body>
</html>
