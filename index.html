<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday My Serena Williams</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:white;
text-align:center;
}

/* balloons */

.balloon{
position:absolute;
bottom:-120px;
width:70px;
height:90px;
border-radius:50%;
animation:float 10s infinite;
opacity:0.9;
}

.balloon:nth-child(1){left:10%;background:#ff3b3b;}
.balloon:nth-child(2){left:25%;background:#ffd93b;animation-duration:12s;}
.balloon:nth-child(3){left:45%;background:#4dabf7;animation-duration:9s;}
.balloon:nth-child(4){left:65%;background:#9b5de5;animation-duration:11s;}
.balloon:nth-child(5){left:85%;background:#2ec4b6;animation-duration:13s;}

@keyframes float{
0%{transform:translateY(0);}
100%{transform:translateY(-130vh);}
}

h1{
font-size:48px;
margin-bottom:10px;
text-shadow:0 5px 20px rgba(0,0,0,0.3);
}

#message{
font-size:22px;
max-width:550px;
min-height:80px;
}

button{
margin-top:25px;
padding:12px 28px;
border:none;
border-radius:30px;
background:white;
color:#ff4d79;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

#secret{
display:none;
margin-top:20px;
font-size:20px;
max-width:520px;
animation:fade 2s;
}

@keyframes fade{
from{opacity:0;}
to{opacity:1;}
}

/* sparkles */

.sparkle{
position:absolute;
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:spark 3s infinite;
}

@keyframes spark{
0%{opacity:0; transform:scale(0);}
50%{opacity:1; transform:scale(1.5);}
100%{opacity:0; transform:scale(0);}
}

</style>
</head>

<body>

<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>
<div class="balloon"></div>

<h1>Happy Birthday 🎂</h1>
<h2>My Serena Williams</h2>

<p id="message"></p>

<button onclick="showMessage()">A small message for you 💌</button>

<div id="secret">
You might not realize it, but your smile has a way of making everything feel lighter.  
The world feels a little better knowing someone like you exists in it.  

On your birthday, I just hope life gives you the same happiness you bring to others.  

Stay amazing. 🌸
</div>

<script>

/* typing message */

let text="Today is not just another day... it's the day someone truly special came into this world.";
let i=0;

function typing(){
if(i<text.length){
document.getElementById("message").innerHTML+=text.charAt(i);
i++;
setTimeout(typing,45);
}
}

typing();

function showMessage(){
document.getElementById("secret").style.display="block";
}

/* sparkles */

for(let i=0;i<40;i++){
let s=document.createElement("div");
s.className="sparkle";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.animationDelay=Math.random()*3+"s";
document.body.appendChild(s);
}

</script>

</body>
</html>
